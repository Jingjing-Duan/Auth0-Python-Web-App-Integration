<!DOCTYPE html>
<html>
<head>
    <title>CST8919 Flask Auth0 Lab</title>
</head>
<body>
    <h1>CST8919 Lab 1 - Flask Auth0 Login</h1>

    {% if session %}
        <p>You are logged in.</p>

        <a href="/protected">Go to Protected Page</a>
        <br><br>
        <a href="/logout">Logout</a>

        <h2>User Info</h2>
        <pre>{{ pretty }}</pre>
    {% else %}
        <p>You are not logged in.</p>
        <a href="/login">Login</a>
    {% endif %}
</body>
</html>
